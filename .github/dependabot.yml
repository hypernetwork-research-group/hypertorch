version: 2

updates:
  # Python dependencies (works for both pip-based requirements files
  # and pyproject.toml / uv-managed projects)
- package-ecosystem: "pip"
  directory: "/"
  schedule:
    interval: "weekly"
  open-pull-requests-limit: 2
  cooldown:
  default-days: 7
  semver-major-days: 14
  semver-minor-days: 7
  semver-patch-days: 3
  groups:
    python-minor-patch:
      applies-to: version-updates
      update-types:
      - "minor"
      - "patch"
  labels:
  - "chore(deps)"
  commit-message:
    prefix: "chore: python deps"

- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: "weekly"
  open-pull-requests-limit: 2
  cooldown:
  default-days: 7
  semver-major-days: 14
  semver-minor-days: 7
  semver-patch-days: 3
  groups:
    actions-minor-patch:
      applies-to: version-updates
      update-types:
      - "minor"
      - "patch"
  labels:
  - "ci(deps)"
  commit-message:
    prefix: "chore: actions deps"

name: Weekly CI

on:
  schedule:
  - cron: "0 0 * * 0"  # every week at 00:00 CET (6:00 PM EST)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  setup-tags:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      with:
        fetch-depth: 0
        persist-credentials: false

    - name: Get latest tag and commit
      id: get_tag_commit
      run: |
        TAG_TO_CHECK=$(git tag --sort=-creatordate | head -n 1) # latest tag including beta
        COMMIT_TO_CHECK=$(git rev-list -n 1 "$TAG_TO_CHECK")
        echo "TAG_TO_CHECK=$TAG_TO_CHECK" >> $GITHUB_ENV
        echo "COMMIT_TO_CHECK=$COMMIT_TO_CHECK" >> $GITHUB_ENV
        {
          echo "## Latest Git Tag"
          echo ""
          echo "| Variable | Value |"
          echo "| --- | --- |"
          echo "| Tag | \`$TAG_TO_CHECK\` |"
          echo "| Commit | \`$COMMIT_TO_CHECK\` |"
        } >> "$GITHUB_STEP_SUMMARY"

  test-ubuntu-x86:
    needs: setup-tags
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - name: Install uv with Python ${{ matrix.python-version }}
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
      with:
        python-version: ${{ matrix.python-version }}

    - name: Download and run examples
      shell: bash
      run: |
        uv venv ubuntu-env
        source ubuntu-env/bin/activate || source ubuntu-env/Scripts/activate
        uv pip install "torch>=2.12,<3.0" --index-url https://download.pytorch.org/whl/cpu
        uv pip install pyg-lib --find-links https://data.pyg.org/whl/torch-2.12.0+cpu.html
        uv pip install --no-build-isolation hypertorch
        TAG_TO_CHECK=$(git tag --sort=-creatordate | head -n 1) # latest tag including beta
        COMMIT_TO_CHECK=$(git rev-list -n 1 "$TAG_TO_CHECK")
        curl -fsSL https://raw.githubusercontent.com/hypernetwork-research-group/hypertorch/${COMMIT_TO_CHECK}/scripts/weekly_run.sh | bash

  test-ubuntu-arm:
    needs: setup-tags
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04-arm]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - name: Install uv with Python ${{ matrix.python-version }}
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
      with:
        python-version: ${{ matrix.python-version }}

    - name: Download and run examples
      shell: bash
      run: |
        uv venv ubuntu-env
        source ubuntu-env/bin/activate || source ubuntu-env/Scripts/activate
        uv pip install "torch>=2.11,<2.12" --index-url https://download.pytorch.org/whl/cpu
        uv pip install torch-cluster --find-links https://data.pyg.org/whl/torch-2.11.0+cpu.html
        uv pip install --no-build-isolation hypertorch
        TAG_TO_CHECK=$(git tag --sort=-creatordate | head -n 1) # latest tag including beta
        COMMIT_TO_CHECK=$(git rev-list -n 1 "$TAG_TO_CHECK")
        curl -fsSL https://raw.githubusercontent.com/hypernetwork-research-group/hypertorch/${COMMIT_TO_CHECK}/scripts/weekly_run.sh | bash

  test-macos-arm:
    needs: setup-tags
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - name: Install uv with Python ${{ matrix.python-version }}
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
      with:
        python-version: ${{ matrix.python-version }}

    - name: Download and run examples
      shell: bash
      run: |
        uv venv macos-env
        source macos-env/bin/activate || source macos-env/Scripts/activate
        uv pip install "torch>=2.12,<3.0" --index-url https://download.pytorch.org/whl/cpu
        uv pip install pyg-lib --find-links https://data.pyg.org/whl/torch-2.12.0+cpu.html
        uv pip install --no-build-isolation hypertorch
        TAG_TO_CHECK=$(git tag --sort=-creatordate | head -n 1) # latest tag including beta
        COMMIT_TO_CHECK=$(git rev-list -n 1 "$TAG_TO_CHECK")
        curl -fsSL https://raw.githubusercontent.com/hypernetwork-research-group/hypertorch/${COMMIT_TO_CHECK}/scripts/weekly_run.sh | bash

  test-windows-x86:
    needs: setup-tags
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - name: Install uv with Python ${{ matrix.python-version }}
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
      with:
        python-version: ${{ matrix.python-version }}

    - name: Download and run examples
      shell: bash
      run: |
        uv venv windows-env
        source windows-env/Scripts/activate
        uv pip install "torch>=2.12,<3.0" --index-url https://download.pytorch.org/whl/cpu
        uv pip install pyg-lib --find-links https://data.pyg.org/whl/torch-2.12.0+cpu.html
        uv pip install hypertorch
        TAG_TO_CHECK=$(git tag --sort=-creatordate | head -n 1) # latest tag including beta
        COMMIT_TO_CHECK=$(git rev-list -n 1 "$TAG_TO_CHECK")
        curl -fsSL https://raw.githubusercontent.com/hypernetwork-research-group/hypertorch/${COMMIT_TO_CHECK}/scripts/weekly_run.sh | bash

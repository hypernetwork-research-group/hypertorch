name: Manage PR and issue labels

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  issues:
    types: [opened, reopened, labeled, unlabeled]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@v6
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yaml
          sync-labels: true

  assignees:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              assignees: [context.payload.pull_request.user.login]
            })

  validate-issue-labels:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    permissions:
      issues: read
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const requiredType = ["feature", "fix", "chore", "refactoring"];
            const requiredArea = ["ci", "data", "docs", "models", "tests", "training", "types", "utils"];

            const labels = (context.payload.issue.labels || []).map((l) => l.name);
            const hasType = labels.some((name) => requiredType.includes(name));
            const hasArea = labels.some((name) => requiredArea.includes(name));

            if (!hasType || !hasArea) {
              core.setFailed(
                [
                  "Issue must include at least two labels:",
                  `- one of: ${requiredType.join(", ")}`,
                  `- one of: ${requiredArea.join(", ")}`,
                  `Current labels: ${labels.length ? labels.join(", ") : "(none)"}`,
                ].join("\n")
              );
            }
